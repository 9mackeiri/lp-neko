<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ずっと子どもを見てきたあなたへ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f7f0f5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    background: #c47fa0;
    color: #fff;
    text-align: center;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .viewer-wrap {
    flex: 1;
    width: 100%;
    max-width: 900px;
    padding: 0;
  }
  iframe {
    width: 100%;
    height: calc(100vh - 48px);
    border: none;
    display: block;
  }
  .fallback {
    display: none;
    padding: 40px 20px;
    text-align: center;
  }
  .fallback a {
    color: #c47fa0;
    font-weight: 700;
    text-decoration: underline;
  }
</style>
</head>
<body>
<header>ずっと子どもを見てきたあなたへ</header>
<div class="viewer-wrap">
  <iframe
    src="ずっと子どもを見てきたあなたへ.pdf"
    title="ずっと子どもを見てきたあなたへ"
    onerror="document.querySelector('.fallback').style.display='block'; this.style.display='none';"
  ></iframe>
  <div class="fallback">
    <p>PDFが表示されない場合は<a href="ずっと子どもを見てきたあなたへ.pdf" target="_blank">こちらからダウンロード</a>してください。</p>
  </div>
</div>
</body>
</html>
